                >備註 / 車況紀錄</label
              >
              <textarea
                class="w-full px-3 py-2 bg-surface border border-surface-border rounded font-body-sm text-body-sm text-on-surface focus:outline-none focus:border-gold-accent focus:ring-1 focus:ring-gold-accent transition-all resize-none"
                rows="3"
              >
ACC環景、CarPlay</textarea
              >
            </div>
          </form>
        </div>
        <!-- Modal Footer -->
        <div
          class="px-6 py-4 border-t border-surface-border bg-surface-container-low flex justify-end gap-3 rounded-b-xl"
        >
          <button class="erp-btn-secondary is-md" onclick="closeModal()">
            取消
          </button>
          <button class="erp-btn-primary is-md" onclick="closeModal()">
            儲存
          </button>
        </div>
      </div>
    </div>
    <script>
      // Dropdown Logic
      const userBtn = document.getElementById("userMenuBtn");
      const userDropdown = document.getElementById("userDropdown");

      userBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        userDropdown.classList.toggle("active");
      });

      document.addEventListener("click", (e) => {
        if (!userDropdown.contains(e.target) && e.target !== userBtn) {
          userDropdown.classList.remove("active");
        }
      });

      // Modal Logic
      const modal = document.getElementById("formModal");

      function openModal() {
        modal.classList.add("active");
        document.body.style.overflow = "hidden"; // Prevent background scrolling
      }

      function closeModal() {
        modal.classList.remove("active");
        document.body.style.overflow = "";
      }

      // Close modal on outside click
      modal.addEventListener("click", (e) => {
        if (e.target === modal) {
          closeModal();
        }
      });

      // Escape key to close modal
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && modal.classList.contains("active")) {
          closeModal();
        }
      });
    </script>
  </body>
</html>
