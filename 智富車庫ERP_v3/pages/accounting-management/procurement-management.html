    body {

  <script>
    (function () {
      const modalOpens = document.querySelectorAll("[data-modal-open]");
      const modalCloses = document.querySelectorAll("[data-modal-close]");
      const modals = document.querySelectorAll("[data-modal]");

      function openModal(name) {
        const modal = document.querySelector(`[data-modal="${name}"]`);
        if (!modal) return;
        modal.classList.remove("hidden");
        modal.classList.add("flex");
        document.body.classList.add("overflow-hidden");
      }

      function closeModal(name) {
        const modal = document.querySelector(`[data-modal="${name}"]`);
        if (!modal) return;
        modal.classList.add("hidden");
        modal.classList.remove("flex");
        if (!document.querySelector("[data-modal]:not(.hidden)")) {
          document.body.classList.remove("overflow-hidden");
        }
      }

      modalOpens.forEach((button) => {
        button.addEventListener("click", () =>
          openModal(button.dataset.modalOpen),
        );
      });

      modalCloses.forEach((button) => {
        button.addEventListener("click", () =>
          closeModal(button.dataset.modalClose),
        );
      });

      modals.forEach((modal) => {
        modal.addEventListener("click", (event) => {
          if (event.target === modal) {
            closeModal(modal.dataset.modal);
          }
        });
      });

      document.addEventListener("keydown", (event) => {
        if (event.key !== "Escape") return;
        document.querySelectorAll("[data-modal].flex").forEach((modal) => {
          closeModal(modal.dataset.modal);
        });
      });
