<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car ERP前端介面固定框架</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="./介面固定框架/前端介面固定框架.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>



</head>

<body>

    <!-- Header -->
    <header class="header">

        <div class="logo">
            🚗 Car ERP 系統 (我們的網站的名稱)
        </div>

        <div class="user-area">

            <!-- header 齒輪設定欄位 -->
            <div class="dropdown">
                <i class="fa-solid fa-gear setting-btn" data-bs-toggle="dropdown"></i>
                <ul class="dropdown-menu">

                    <li>
                        <a class="dropdown-item" href="#">
                            <i class="fa-solid fa-key me-2"></i>
                            變更密碼
                        </a>
                    </li>

                    <li>
                        <a class="dropdown-item" href="#">
                            <i class="fa-solid fa-right-from-bracket me-2"></i>
                            登出
                        </a>
                    </li>
                </ul>
            </div>

            <!-- header 名稱 + 職稱 -->
            <div class="user-info">
                <div class="user-name">王大明</div>
                <div class="user-role">業務(職稱)</div>
            </div>
        </div>

    </header>

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="menu-item active" data-page="儀錶板">
            <i class="fa-solid fa-chart-line"></i>
            儀錶板
        </div>

        <div class="menu-item" data-page="車輛管理" id="allCar">
            <i class="fa-solid fa-car"></i>
            車輛管理
        </div>

        <div class="menu-item" data-page="客戶管理" >
            <i class="fa-solid fa-users"></i>
            客戶管理
        </div>

        <div class="menu-item" data-page="訂單管理">
            <i class="fa-solid fa-file-invoice"></i>
            訂單管理
        </div>

        <div class="menu-item" data-page="業務管理">
            <i class="fa-solid fa-user-tie"></i>
            業務管理
        </div>

        <div class="menu-item" data-page="採購管理">
            <i class="fa-solid fa-cart-shopping"></i>
            採購管理
        </div>

        <div class="menu-item" data-page="車籍資料" id="carHistory">
            <i class="fa-solid fa-id-card"></i>
            車籍資料
        </div>

        <div class="menu-item" data-page="文件管理">
            <i class="fa-solid fa-folder-open"></i>
            文件管理
        </div>

    </aside>

    <!-- Content -->
    <main class="content">

        <div id="pageContent">

            <div class="page-title">
                儀錶板
            </div>
            <!-- 這裡放統整後的內容 -->


        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ===============================
        // Car ERP SPA Router
        // ===============================

        // 當前頁面紀錄（避免重複載入）
        let currentPage = "儀錶板";

        // 頁面對應（SPA核心）
        const pageMap = {
            "儀錶板": renderDashboard,
            "車輛管理": loadVehiclePage,
            "客戶管理": loadCustomerPage,
            "訂單管理": loadOrderPage,
            "業務管理": loadSalesPage,
            "採購管理": loadPurchasePage,
            "車籍資料": loadCarHistoryPage,
            "文件管理": loadDocumentPage
        };

        // ===============================
        // 初始化
        // ===============================
        $(document).ready(function () {

            $(".menu-item").on("click", function () {

                const page = $(this).data("page");

                // 防止重複點同一頁
                if (page === currentPage) return;

                currentPage = page;

                // active 切換
                $(".menu-item").removeClass("active");
                $(this).addClass("active");

                // 路由切換
                if (pageMap[page]) {
                    pageMap[page]();
                } else {
                    $("#pageContent").html(`<div class="page-title">${page}</div>`);
                }
            });

            // 預設載入儀錶板
            pageMap["儀錶板"]();
        });


        // ===============================
        // 頁面函式（SPA核心）
        // ===============================

        // 儀錶板
        function renderDashboard() {
            $("#pageContent").html(`
        <div class="page-title">儀錶板</div>
        <div class="card p-3 mt-3">
            <h5>歡迎使用 Car ERP 系統</h5>
            <p>這裡可以放統計數據、圖表、銷售資訊</p>
        </div>
    `);
        }


        // 車輛管理
        function loadVehiclePage() {
            $("#pageContent").html(`
        <div id="allCarContainer"></div>
    `);
            $("#allCarContainer").load("./allCar/allCar.html");
        }



        // 客戶管理
        function loadCustomerPage() {

            $("#pageContent").html(`
        <div id="customerContainer"></div>
    `);

            $("#customerContainer").load("./customer/customer.html");

        }


        // 訂單管理
        function loadOrderPage() {
            $("#pageContent").html(`
        <div class="page-title">訂單管理</div>
    `);
        }


        // 業務管理
        function loadSalesPage() {
            $("#pageContent").html(`
        <div class="page-title">業務管理</div>
    `);
        }


        // 採購管理
        function loadPurchasePage() {
            $("#pageContent").html(`
        <div class="page-title">採購管理</div>
    `);
        }


        // 車籍資料
        function loadCarHistoryPage() {
            // <div class="page-title">車籍資料</div>

            $("#pageContent").html(`
        <div id="carHistoryContainer"></div>
    `);
            $("#carHistoryContainer").load("./carHistory/carHistory.html");
        }


        // 文件管理
        function loadDocumentPage() {
            $("#pageContent").html(`
        <div class="page-title">文件管理</div>
    `);
        }
    </script>

</body>

</html>
