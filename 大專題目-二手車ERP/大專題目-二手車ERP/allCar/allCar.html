<style>
/* =========================
   共用
========================= */

body{
    background:#f4f6f9;
    font-family:"Microsoft JhengHei",sans-serif;
}

.vehicle-page{
    width:100%;
}

/* =========================
   標題列
========================= */

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.top-bar h1{
    margin:0;
    font-size:28px;
    color:#1f2937;
}

#statusFilter{
    height:40px;
    min-width:150px;
    border:1px solid #ddd;
    border-radius:8px;
    padding:0 10px;
}

/* =========================
   區塊標題
========================= */

.section-title{
    font-size:22px;
    font-weight:bold;
    margin:25px 0 15px;
    color:#111827;
}

/* =========================
   卡片排列
========================= */

.car-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:20px;
}

/* =========================
   車輛卡片
========================= */

.car-card{
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.car-card:hover{
    transform:translateY(-5px);
    box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.car-image{
    width:100%;
    height:220px;
    object-fit:cover;
}

.car-info{
    padding:15px;
}

.car-title{
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

.car-detail{
    color:#666;
    margin-bottom:5px;
}

.sell-price{
    margin-top:15px;
    font-size:28px;
    font-weight:bold;
    color:#e11d48;
}

/* =========================
   狀態標籤
========================= */

.tag{
    display:inline-block;
    padding:5px 12px;
    border-radius:30px;
    color:#fff;
    margin-top:10px;
    font-size:13px;
}

.unsold{
    background:#10b981;
}

.sold{
    background:#6b7280;
}

/* =========================
   詳細資料
========================= */

.vehicle-detail{
    max-width:1200px;
    margin:auto;
}

.vehicle-header{
    background:#fff;
    border-radius:15px;
    padding:25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.vehicle-info h1{
    margin:0;
}

.vehicle-subtitle{
    margin-top:10px;
    color:#666;
}

.vehicle-price h2{
    margin:0;
    font-size:42px;
    color:#dc2626;
}

/* =========================
   返回按鈕
========================= */

.back-btn{
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:8px;
    padding:10px 18px;
    cursor:pointer;
    margin-bottom:20px;
}

.back-btn:hover{
    background:#1d4ed8;
}

/* =========================
   照片
========================= */

.photo-section{
    background:#fff;
    border-radius:15px;
    padding:15px;
    margin-bottom:20px;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.main-photo{
    width:100%;
    max-height:550px;
    object-fit:cover;
    border-radius:10px;
}

/* =========================
   資訊卡片
========================= */

.info-card{
    background:#fff;
    border-radius:15px;
    padding:25px;
    margin-bottom:20px;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.info-card h2{
    margin-top:0;
    border-bottom:2px solid #eee;
    padding-bottom:10px;
}

.info-grid{
    display:grid;
    grid-template-columns:200px 1fr;
    row-gap:12px;
    column-gap:15px;
}

.info-grid div:nth-child(odd){
    font-weight:bold;
    color:#374151;
}

.info-grid div:nth-child(even){
    color:#111827;
}

/* =========================
   搜尋區
========================= */

.filter-panel{
    background:#fff;
    padding:20px;
    border-radius:15px;
    margin-bottom:25px;
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    align-items:end;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.filter-group{
    display:flex;
    flex-direction:column;
}

.filter-group label{
    margin-bottom:5px;
    font-weight:600;
}

.filter-group select,
.filter-group input{
    height:42px;
    min-width:180px;
    border:1px solid #ddd;
    border-radius:8px;
    padding:0 10px;
}

.btn-search{
    height:42px;
    padding:0 25px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

.btn-search:hover{
    background:#1d4ed8;
}
</style>

<div class="vehicle-page">

    <div id="listPage">

        <div class="top-bar">
            <h1>車輛管理</h1>

            <select id="statusFilter" onchange="filterCars()">
                <option value="all">全部車輛</option>
                <option value="未售出">未售出</option>
                <option value="已售出">已售出</option>
            </select>
        </div>

        <!-- 上方篩選區 -->
        <div class="filter-panel">

            <div class="filter-group">
                <label>年份</label>
                <select id="yearFilter">
                    <option value="all">全部年份</option>
                    <option value="2024">2024</option>
                    <option value="2023">2023</option>
                    <option value="2022">2022</option>
                    <option value="2021">2021</option>
                </select>
            </div>

            <div class="filter-group">
                <label>廠牌</label>
                <select id="brandFilter">
                    <option value="all">全部廠牌</option>
                    <option value="Toyota">Toyota</option>
                    <option value="Mazda">Mazda</option>
                    <option value="BMW">BMW</option>
                </select>
            </div>

            <div class="filter-group">
                <label>最低價格</label>
                <input type="number" id="minPrice" placeholder="最低價">
            </div>

            <div class="filter-group">
                <label>最高價格</label>
                <input type="number" id="maxPrice" placeholder="最高價">
            </div>

            <div class="filter-btn-area">
                <button class="btn-search" onclick="filterCars()">
                    搜尋車輛
                </button>
            </div>

        </div>

        <!-- 以下保留原本內容 -->

        <div id="unsoldSection">

            <div class="car-grid">

                <!-- CAR 1 -->
                <div class="car-card" data-status="未售出" data-year="2024" data-brand="Toyota" data-price="79.8" onclick="showDetail({
title:'Toyota Corolla Cross',

})">

                        class="car-image">

                    <div class="car-info">
                        <div class="car-title">Toyota Corolla Cross</div>

                        <div class="car-detail">廠牌：Toyota</div>

                <!-- CAR 2 -->
                <div class="car-card" data-status="未售出" data-year="2021" data-brand="BMW" data-price="128" onclick="showDetail({

})">

                    <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1200&auto=format&fit=crop"

                    <div class="car-info">

    <!-- 詳細資料 -->

        <button class="back-btn" onclick="backToList()">← 返回</button>

            <div class="vehicle-info">

        <div class="info-card">
            <h2>售價資訊</h2>

            <div class="info-grid">
                <div>售價</div>
                <div id="detailSalePrice2"></div>
            </div>
        </div>

    </div>

</div>

<script>

    /* 千分位 + 去小數點（會計格式） */
    function formatMoney(num) {
        return Number(num).toLocaleString('zh-TW', {
            maximumFractionDigits: 0
        });
    }

    /* 篩選 */
    function filterCars() {

        let year = document.getElementById("yearFilter").value;
        let brand = document.getElementById("brandFilter").value;
        let min = document.getElementById("minPrice").value;
        let max = document.getElementById("maxPrice").value;
        let status = document.getElementById("statusFilter").value;

        document.querySelectorAll(".car-card").forEach(card => {

            let show = true;

            if (year !== "all" && card.dataset.year !== year) show = false;
            if (brand !== "all" && card.dataset.brand !== brand) show = false;
            if (status !== "all" && card.dataset.status !== status) show = false;

            let price = parseFloat(card.dataset.price);

            if (min && price < parseFloat(min)) show = false;
            if (max && price > parseFloat(max)) show = false;

            card.style.display = show ? "block" : "none";

        });

    }

    /* 詳情頁（ERP標準） */
    function showDetail(car) {

        document.getElementById("listPage").style.display = "none";
        document.getElementById("detailPage").style.display = "block";

        document.getElementById("detailTitle").innerText = car.title;
        document.getElementById("detailYear").innerText = car.year + "年";
        document.getElementById("detailMileage").innerText = car.mileage;
        document.getElementById("detailStatus").innerText = car.status;

        document.getElementById("detailSalePrice").innerText =
            formatMoney(car.salePrice);

        document.getElementById("detailSalePrice2").innerText =
            formatMoney(car.salePrice);

        document.getElementById("detailImage").src = car.image;

        document.getElementById("detailPlate").innerText = car.plate;
        document.getElementById("detailYear2").innerText = car.year;
        document.getElementById("detailBrand").innerText = car.brand;
        document.getElementById("detailModel").innerText = car.model;
        document.getElementById("detailCc").innerText = car.cc;
        document.getElementById("detailColor").innerText = car.color;
        document.getElementById("detailMileage2").innerText = car.mileage;

        document.getElementById("detailBuyDate").innerText = car.buyDate;

        document.getElementById("detailBuyPrice").innerText =
            formatMoney(car.buyPrice);

        document.getElementById("detailRepairDate").innerText = car.repairDate;

        document.getElementById("detailRepairCost").innerText =
            formatMoney(car.repairCost);

        document.getElementById("detailRemark").innerText = car.remark;

    }

    /* 返回 */
    function backToList() {
        document.getElementById("listPage").style.display = "block";
        document.getElementById("detailPage").style.display = "none";
    }

</script>
