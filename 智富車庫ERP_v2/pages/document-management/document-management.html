        <div class="erp-main-page-header">
          <h3 class="erp-main-page-title">文件管理</h3>
          <p class="erp-main-page-desc">管理合約、附件與相關文件</p>
        </div>
        <!-- Toolbar (Search, Filters, Actions) -->
        <div
          class="bg-surface-elevated rounded-lg shadow-ambient border border-surface-border p-6"
        >
          <div class="flex flex-col gap-4">
            <div class="flex flex-col xl:flex-row xl:items-start gap-4">
              <div
                class="erp-search-wrapper erp-header-search-wrapper"
                style="max-width: 720px"
              >
                <input
                  class="erp-search erp-header-search"
                  placeholder="搜尋訂單編號、客戶姓名、文件名稱"
                  type="text"
                />
                <span
                  class="material-symbols-outlined erp-search-icon erp-header-search-icon"
                  >search</span
                >
              </div>
              <button class="erp-btn-primary is-lg xl:shrink-0">
                <span
                  class="material-symbols-outlined text-[18px]"
                  style="font-variation-settings: &quot;FILL&quot; 0"
                  >add</span
                >
                新增文件
              </button>
            </div>

            <div
              class="flex flex-col xl:flex-row xl:items-center xl:justify-between gap-3"
            >
              <div
                class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-3 flex-1"
              >
                <div class="relative">
                  <input class="erp-filter-control" placeholder="開始日期" readonly="" type="text" />
                </div>
                <div class="relative">
                  <input class="erp-filter-control" placeholder="結束日期" readonly="" type="text" />
                </div>
                <div class="relative">
                  <select class="erp-filter-control">
                    <option disabled="" selected="" value="">全部業務</option>
                    <option value="王大明">王大明</option>
                    <option value="李小華">李小華</option>
                  </select>
                  <span
                    class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-[#9b8b83] pointer-events-none text-[20px]"
                    >expand_more</span
                  >
                </div>
                <div class="relative">
                  <select class="erp-filter-control">
                    <option disabled="" selected="" value="">全部文件類型</option>
                    <option value="order">訂單文件</option>
                    <option value="contract">合約文件</option>
                    <option value="delivery">交車文件</option>
                  </select>
                  <span
                    class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-[#9b8b83] pointer-events-none text-[20px]"
                    >expand_more</span
                  >
                </div>
              </div>

                <button class="erp-btn-primary is-lg">
                  <span class="material-symbols-outlined text-[18px]"
                    >search</span
                  >
                  搜尋
                </button>
                <button class="erp-btn-secondary is-lg">
                  <span class="material-symbols-outlined text-[18px]"
                    >refresh</span
                  >
                  重設
                </button>
              </div>
            </div>

                    客戶名稱

                  <th
                    class="py-4 px-6 font-label-md text-label-md text-on-surface-variant font-semibold"

        <div

          <div class="font-body-sm text-outline-variant erp-pagination-info">
