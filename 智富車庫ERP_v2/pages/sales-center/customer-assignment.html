<!doctype html>
<html lang="zh-TW">
  <head>

    <title>Prestige Auto ERP - 客戶分配系統</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link href="../../assets/css/components.css" rel="stylesheet" />
    <style>
      body {
        background-color: #fff8f5;
      } /* surface */

      /* Ambient shadow utility for cards */
      .ambient-shadow {
        box-shadow: 0 16px 32px -8px rgba(39, 24, 18, 0.08); /* slight deep brown hint */
      }

      /* Custom scrollbar for table if needed */
      .table-container::-webkit-scrollbar {
        height: 6px;
      }
      .table-container::-webkit-scrollbar-track {
        background: #f9f2ef;
      }
      .table-container::-webkit-scrollbar-thumb {
        background: #dbc1b7;
        border-radius: 4px;
      }
    </style>
  </head>
  <body
    class="bg-surface text-on-surface font-body-md antialiased overflow-hidden flex h-screen"
  >
    <!-- SideNavBar (Shared Component) -->
    <script>
      window.currentPage = "sales";
    </script>
    <div data-sidebar></div>
    <script src="../../assets/layouts/sidebar.js"></script>
    <!-- Main Content Canvas -->
    <main class="ml-[280px] flex-1 flex flex-col h-full bg-surface">
      <div data-sales-center-topbar></div>
      <script src="../../assets/layouts/sales-center-topbar.js"></script>
      <!-- Scrollable Content Area -->
      <div class="flex-1 overflow-auto">
        <div class="erp-page-container flex flex-col gap-8">
          <!-- Page Header -->
          <div class="erp-main-page-header">
            <h3 class="erp-main-page-title">業務中心</h3>
            <p class="erp-main-page-desc">管理業務人員與銷售績效</p>
          </div>
          <!-- KPI Cards Bento Grid -->
          <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
            <div class="erp-kpi-card">
              <div class="erp-kpi-head">
                <p class="erp-kpi-title">總客戶數</p>
                <div class="erp-kpi-icon">
                  <span class="material-symbols-outlined">group</span>
                </div>
              </div>
              <div class="erp-kpi-value-row">
                <span class="erp-kpi-value">120</span
                ><span class="erp-kpi-unit">位</span>
              </div>
            </div>
            <div class="erp-kpi-card">
              <div class="erp-kpi-head">
                <p class="erp-kpi-title">待分配客戶</p>
                <div class="erp-kpi-icon">
                  <span class="material-symbols-outlined">person_add</span>
                </div>
              </div>
              <div class="erp-kpi-value-row">
                <span class="erp-kpi-value">10</span
                ><span class="erp-kpi-unit">位</span>
              </div>
            </div>
            <div class="erp-kpi-card">
              <div class="erp-kpi-head">
                <p class="erp-kpi-title">追蹤中客戶</p>
                <div class="erp-kpi-icon">
                  <span class="material-symbols-outlined">visibility</span>
                </div>
              </div>
              <div class="erp-kpi-value-row">
                <span class="erp-kpi-value">75</span
                ><span class="erp-kpi-unit">位</span>
              </div>
            </div>
            <div class="erp-kpi-card">
              <div class="erp-kpi-head">
                <p class="erp-kpi-title">重點關注</p>
                <div class="erp-kpi-icon">
                  <span class="material-symbols-outlined">priority_high</span>
                </div>
              </div>
              <div class="erp-kpi-value-row">
                <span class="erp-kpi-value">20</span
                ><span class="erp-kpi-unit">位</span>
              </div>
            </div>
            <div class="erp-kpi-card">
              <div class="erp-kpi-head">
                <p class="erp-kpi-title">已成交</p>
                <div class="erp-kpi-icon">
                  <span class="material-symbols-outlined">task_alt</span>
                </div>
              </div>
              <div class="erp-kpi-value-row">
                <span class="erp-kpi-value">15</span
                ><span class="erp-kpi-unit">位</span>
              </div>
            </div>
          </div>
          <!-- Main Action Section & Table -->
          <div
            class="bg-surface-elevated rounded border border-surface-border ambient-shadow flex flex-col erp-table-card"
          >
            <!-- Section Header -->
            <div
              class="px-8 py-6 border-b border-surface-border flex justify-between items-end"
            >
              <div>
                <h2 class="font-headline-md text-headline-md text-primary mb-1">
                  待分配客戶
                </h2>
                <p class="font-body-sm text-body-sm text-on-surface-variant">
                  依目前業務負載平均分配客戶
                </p>
              </div>
              <div class="flex gap-3">
                <button class="erp-btn-secondary is-md">返回上一步</button>
                <button class="erp-btn-secondary is-md">一鍵分配</button>
                <button class="erp-btn-primary is-md">確認分配</button>
              </div>
            </div>
            <!-- Table -->
            <div class="table-container overflow-x-auto w-full">
              <table
                class="w-full text-left border-collapse min-w-[800px] erp-table"
              >
                <thead>
                  <tr
                    class="border-b border-surface-border bg-surface/50 erp-table-header"
                  >
                    <th
                      class="py-4 px-8 font-label-md text-label-md text-primary font-bold"
                    >
                      客戶姓名
                    </th>
                    <th
                      class="py-4 px-8 font-label-md text-label-md text-primary font-bold"
                    >
                      預算
                    </th>
                    <th
                      class="py-4 px-8 font-label-md text-label-md text-primary font-bold"
                    >
                      偏好車型
                    </th>
                    <th
                      class="py-4 px-8 font-label-md text-label-md text-primary font-bold"
                    >
                      客戶來源
                    </th>
                    <th
                      class="py-4 px-8 font-label-md text-label-md text-primary font-bold"
                    >
                      指派業務
                    </th>
                  </tr>
                </thead>
                <tbody
                  class="font-body-sm text-body-sm text-on-surface erp-table-body"
                >
                  <!-- Row 1 -->
                  <tr
                    class="border-b border-surface-border hover:bg-surface-container-low/50 transition-colors"
                  >
                    <td class="py-4 px-8">陳小姐</td>
                    <td class="py-4 px-8">80萬</td>
                    <td class="py-4 px-8 text-on-surface-variant">-</td>
                    <td class="py-4 px-8">Facebook 廣告</td>
                    <td class="py-4 px-8">
                      <select
                        class="form-select w-full rounded border-surface-border bg-surface focus:border-gold-accent focus:ring-gold-accent focus:ring-1 text-sm py-1.5"
                      >
                        <option selected="">王大明</option>
                        <option>陳怡君</option>
                        <option>李大華</option>
                        <option>張志強</option>
                      </select>
                    </td>
                  </tr>
                  <!-- Row 2 -->
                  <tr
                    class="border-b border-surface-border hover:bg-surface-container-low/50 transition-colors"
                  >
                    <td class="py-4 px-8">王先生</td>
                    <td class="py-4 px-8 text-on-surface-variant">-</td>
                    <td class="py-4 px-8">Toyota Altis</td>
                    <td class="py-4 px-8">LINE 官方帳號</td>
                    <td class="py-4 px-8">
                      <select
                        class="form-select w-full rounded border-surface-border bg-surface focus:border-gold-accent focus:ring-gold-accent focus:ring-1 text-sm py-1.5"
                      >
                        <option>王大明</option>
                        <option selected="">陳怡君</option>
                        <option>李大華</option>
                        <option>張志強</option>
                      </select>
                    </td>
                  </tr>
                  <!-- Row 3 -->
                  <tr
                    class="border-b border-surface-border hover:bg-surface-container-low/50 transition-colors"
                  >
                    <td class="py-4 px-8">林小姐</td>
                    <td class="py-4 px-8">120萬</td>
                    <td class="py-4 px-8 text-on-surface-variant">-</td>
                    <td class="py-4 px-8">官網表單</td>
                    <td class="py-4 px-8">
                      <select
                        class="form-select w-full rounded border-surface-border bg-surface focus:border-gold-accent focus:ring-gold-accent focus:ring-1 text-sm py-1.5"
                      >
                        <option>王大明</option>
                        <option>陳怡君</option>
                        <option selected="">李大華</option>
                        <option>張志強</option>
                      </select>
                    </td>
                  </tr>
                  <!-- Row 4 -->
                  <tr
                    class="border-b border-surface-border hover:bg-surface-container-low/50 transition-colors"
                  >
                    <td class="py-4 px-8">張先生</td>
                    <td class="py-4 px-8 text-on-surface-variant">-</td>
                    <td class="py-4 px-8">BMW 320i</td>
                    <td class="py-4 px-8">Google</td>
                    <td class="py-4 px-8">
                      <select
                        class="form-select w-full rounded border-surface-border bg-surface focus:border-gold-accent focus:ring-gold-accent focus:ring-1 text-sm py-1.5"
                      >
                        <option>王大明</option>
                        <option>陳怡君</option>
                        <option>李大華</option>
                        <option selected="">張志強</option>
                      </select>
                    </td>
                  </tr>
                  <!-- Row 5 -->
                  <tr
                    class="hover:bg-surface-container-low/50 transition-colors"
                  >
                    <td class="py-4 px-8">黃小姐</td>
                    <td class="py-4 px-8">70萬</td>
                    <td class="py-4 px-8 text-on-surface-variant">-</td>
                    <td class="py-4 px-8">LINE 官方帳號</td>
                    <td class="py-4 px-8">
                      <select
                        class="form-select w-full rounded border-surface-border bg-surface focus:border-gold-accent focus:ring-gold-accent focus:ring-1 text-sm py-1.5"
                      >
                        <option selected="">王大明</option>
                        <option>陳怡君</option>
                        <option>李大華</option>
                        <option>張志強</option>
                      </select>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
